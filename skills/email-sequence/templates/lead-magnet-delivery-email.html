<!-- Lead Magnet Delivery Email Template
     Customize: {TITLE}, {GREETING}, {DESCRIPTION}, {CTA_LINE}, {CTA_BUTTON_TEXT}, {ASSET_URL}, {NEWSLETTER_PITCH}, {SIGNOFF_NAME}
     Keep: Layout, spacing, button style, font sizes -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Your {TITLE} Is Ready</title>
</head>
<body style="margin:0;padding:0;background-color:#FFFFFF;font-family:Inter,-apple-system,sans-serif;">
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#FFFFFF;">
<tr><td align="center" style="padding:40px 20px;">
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="550" style="max-width:550px;">
<tr><td style="padding:0 24px;">

<!-- BODY COPY -->
<p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#4A4A4A;">{GREETING}</p>
<p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#4A4A4A;">{DESCRIPTION}</p>
<p style="margin:0 0 24px;font-size:16px;line-height:1.7;color:#4A4A4A;">{CTA_LINE}</p>

<!-- CTA BUTTON (left-aligned) -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0">
<tr><td align="left" style="background:#FFFFFF;border:1px solid #CCC;border-radius:4px;">
<a href="{ASSET_URL}" target="_blank" style="display:inline-block;padding:12px 24px;font-family:monospace;font-size:12px;color:#121212;text-decoration:none;text-transform:uppercase;letter-spacing:0.02em;">{CTA_BUTTON_TEXT}</a>
</td></tr>
</table>

<!-- DIVIDER -->
<hr style="margin:48px 0;border:none;border-top:1px solid #eee;">

<!-- NEWSLETTER SECTION -->
<p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#4A4A4A;">{NEWSLETTER_PITCH}</p>
<p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:#4A4A4A;">You're already on the list.</p>
<p style="margin:0;font-size:16px;line-height:1.7;color:#4A4A4A;">{SIGNOFF_NAME}</p>

</td></tr>
</table>
</td></tr>
</table>
</body>
</html>
